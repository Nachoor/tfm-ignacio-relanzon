<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Representacion resumida del objeto candidate_profile generado a partir del CV</title>
  <desc id="desc">Figura academica con cuatro bloques: skills detectadas, experiencia relevante por dominio, variables de inferencia y ajuste a roles.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #d6deea; stroke-width: 2; rx: 18; ry: 18; }
      .panel-accent { fill: #ffffff; stroke: #7aa2d6; stroke-width: 2.5; rx: 18; ry: 18; }
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #14324d; }
      .subtitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; font-weight: 400; fill: #4e6479; }
      .panel-title { font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #14324d; }
      .panel-note { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; fill: #62788d; }
      .text { font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; fill: #243746; }
      .small { font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; fill: #62788d; }
      .chip { fill: #eaf2fb; stroke: #bfd2ea; stroke-width: 1.2; rx: 14; ry: 14; }
      .chip-text { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #24496c; }
      .bar-bg { fill: #e9eef5; rx: 8; ry: 8; }
      .bar-main { fill: #5f8fc9; rx: 8; ry: 8; }
      .bar-muted { fill: #b7c8dc; rx: 8; ry: 8; }
      .bar-highlight { fill: #2f6db2; rx: 8; ry: 8; }
      .value { font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #18344d; text-anchor: end; }
      .label { font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; fill: #243746; }
      .card { fill: #f7fafe; stroke: #d6deea; stroke-width: 1.5; rx: 14; ry: 14; }
      .card-key { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #55708a; }
      .card-val { font-family: "Segoe UI", Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #14324d; }
      .badge { fill: #d9e9fb; stroke: #8ab1df; stroke-width: 1.2; rx: 12; ry: 12; }
      .badge-text { font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #21558f; }
      .footer { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; fill: #5b7185; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <text class="title" x="70" y="70">Representacion resumida del objeto candidate_profile</text>
  <text class="subtitle" x="70" y="102">Salida simplificada generada por CAIQ a partir del CV del candidato</text>

  <rect class="panel" x="60" y="140" width="710" height="360"/>
  <text class="panel-title" x="92" y="185">Skills detectadas</text>
  <text class="panel-note" x="92" y="214">Representacion multi-hot de competencias observadas en el CV</text>

  <rect class="chip" x="92" y="245" width="88" height="34"/>
  <text class="chip-text" x="118" y="267">aws</text>
  <rect class="chip" x="194" y="245" width="98" height="34"/>
  <text class="chip-text" x="220" y="267">azure</text>
  <rect class="chip" x="306" y="245" width="103" height="34"/>
  <text class="chip-text" x="331" y="267">docker</text>
  <rect class="chip" x="423" y="245" width="110" height="34"/>
  <text class="chip-text" x="449" y="267">hadoop</text>
  <rect class="chip" x="547" y="245" width="82" height="34"/>
  <text class="chip-text" x="573" y="267">java</text>
  <rect class="chip" x="643" y="245" width="120" height="34"/>
  <text class="chip-text" x="660" y="267">kubernetes</text>

  <rect class="chip" x="92" y="295" width="98" height="34"/>
  <text class="chip-text" x="115" y="317">nosql</text>
  <rect class="chip" x="204" y="295" width="95" height="34"/>
  <text class="chip-text" x="228" y="317">python</text>
  <rect class="chip" x="313" y="295" width="56" height="34"/>
  <text class="chip-text" x="337" y="317">r</text>
  <rect class="chip" x="383" y="295" width="84" height="34"/>
  <text class="chip-text" x="408" y="317">spark</text>
  <rect class="chip" x="481" y="295" width="70" height="34"/>
  <text class="chip-text" x="505" y="317">sql</text>

  <rect class="card" x="92" y="364" width="290" height="92"/>
  <text class="card-key" x="116" y="396">Numero de skills detectadas</text>
  <text class="card-val" x="116" y="433">11</text>

  <rect class="card" x="404" y="364" width="318" height="92"/>
  <text class="card-key" x="428" y="396">Peso asignado a skills observadas</text>
  <text class="card-val" x="428" y="433">1.0</text>

  <rect class="panel" x="830" y="140" width="710" height="360"/>
  <text class="panel-title" x="862" y="185">Experiencia relevante por dominio</text>
  <text class="panel-note" x="862" y="214">Anios estimados de experiencia segun las senales detectadas en el CV</text>

  <text class="label" x="862" y="266">cloud_mlops_devops</text>
  <rect class="bar-bg" x="1105" y="247" width="320" height="22"/>
  <rect class="bar-main" x="1105" y="247" width="320" height="22"/>
  <text class="value" x="1470" y="264">0.10</text>

  <text class="label" x="862" y="312">data_engineering</text>
  <rect class="bar-bg" x="1105" y="293" width="320" height="22"/>
  <rect class="bar-main" x="1105" y="293" width="160" height="22"/>
  <text class="value" x="1470" y="310">0.05</text>

  <text class="label" x="862" y="358">data_analytics</text>
  <rect class="bar-bg" x="1105" y="339" width="320" height="22"/>
  <rect class="bar-main" x="1105" y="339" width="96" height="22"/>
  <text class="value" x="1470" y="356">0.03</text>

  <text class="label" x="862" y="404">machine_learning</text>
  <rect class="bar-bg" x="1105" y="385" width="320" height="22"/>
  <rect class="bar-muted" x="1105" y="385" width="8" height="22"/>
  <text class="value" x="1470" y="402">0.00</text>

  <text class="label" x="862" y="450">nlp</text>
  <rect class="bar-bg" x="1105" y="431" width="320" height="22"/>
  <rect class="bar-muted" x="1105" y="431" width="8" height="22"/>
  <text class="value" x="1470" y="448">0.00</text>

  <text class="label" x="862" y="496">llm_genai</text>
  <rect class="bar-bg" x="1105" y="477" width="320" height="22"/>
  <rect class="bar-muted" x="1105" y="477" width="8" height="22"/>
  <text class="value" x="1470" y="494">0.00</text>

  <text class="label" x="862" y="542">bi_reporting</text>
  <rect class="bar-bg" x="1105" y="523" width="320" height="22"/>
  <rect class="bar-muted" x="1105" y="523" width="8" height="22"/>
  <text class="value" x="1470" y="540">0.00</text>

  <rect class="panel-accent" x="60" y="540" width="710" height="340"/>
  <text class="panel-title" x="92" y="585">Variables de inferencia</text>
  <text class="panel-note" x="92" y="614">Resumen estructurado del estado profesional estimado por el sistema</text>

  <rect class="card" x="92" y="648" width="194" height="150"/>
  <text class="card-key" x="116" y="682">Seniority inferido</text>
  <text class="card-val" x="116" y="733">student</text>
  <text class="card-val" x="116" y="764">intern</text>

  <rect class="card" x="314" y="648" width="194" height="150"/>
  <text class="card-key" x="338" y="682">Career stage</text>
  <text class="card-val" x="338" y="733">early</text>
  <text class="card-val" x="338" y="764">career</text>

  <rect class="card" x="536" y="648" width="194" height="150"/>
  <text class="card-key" x="560" y="682">Master relacionado</text>
  <text class="card-val" x="560" y="733">No</text>
  <text class="small" x="560" y="764">has_data_related_master = false</text>

  <rect class="panel-accent" x="830" y="540" width="710" height="340"/>
  <text class="panel-title" x="862" y="585">Ajuste a roles</text>
  <text class="panel-note" x="862" y="614">Puntuacion de alineacion actual con las familias profesionales del sistema</text>

  <text class="label" x="862" y="684">data_engineer</text>
  <rect class="bar-bg" x="1085" y="665" width="340" height="24"/>
  <rect class="bar-highlight" x="1085" y="665" width="340" height="24"/>
  <text class="value" x="1470" y="683">34</text>
  <rect class="badge" x="1290" y="628" width="135" height="26"/>
  <text class="badge-text" x="1313" y="646">rol detectado</text>

  <text class="label" x="862" y="730">data_scientist</text>
  <rect class="bar-bg" x="1085" y="711" width="340" height="24"/>
  <rect class="bar-main" x="1085" y="711" width="280" height="24"/>
  <text class="value" x="1470" y="729">28</text>

  <text class="label" x="862" y="776">ml_engineer</text>
  <rect class="bar-bg" x="1085" y="757" width="340" height="24"/>
  <rect class="bar-main" x="1085" y="757" width="210" height="24"/>
  <text class="value" x="1470" y="775">21</text>

  <text class="label" x="862" y="822">data_analyst</text>
  <rect class="bar-bg" x="1085" y="803" width="340" height="24"/>
  <rect class="bar-main" x="1085" y="803" width="190" height="24"/>
  <text class="value" x="1470" y="821">19</text>

  <text class="label" x="862" y="868">other_data_role</text>
  <rect class="bar-bg" x="1085" y="849" width="340" height="24"/>
  <rect class="bar-main" x="1085" y="849" width="170" height="24"/>
  <text class="value" x="1470" y="867">17</text>

  <text class="footer" x="70" y="930">Figura preparada para el apartado 3.6.4. Resume la salida estructurada del perfil a partir de un ejemplo real simplificado de candidate_profile.</text>
</svg>
