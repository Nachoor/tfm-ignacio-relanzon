<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #f6f3ee; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #b6a88e; stroke-width: 2.5; rx: 18; ry: 18; }
      .box2 { fill: #fff9ef; stroke: #c49a3a; stroke-width: 2.5; rx: 18; ry: 18; }
      .box3 { fill: #eef6f2; stroke: #4d8b72; stroke-width: 2.5; rx: 18; ry: 18; }
      .small { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .body { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .note { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
      .arrow { stroke: #7c6f58; stroke-width: 4; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c6f58"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="70" y="70">Pipeline de scraping y actualización incremental</text>
  <text class="subtitle" x="70" y="108">Esquema operativo del proceso descrito en el apartado 5.2</text>

  <rect class="box" x="70" y="180" width="260" height="130"/>
  <text class="small" x="110" y="225">Fuentes de empleo</text>
  <text class="body" x="110" y="258">Indeed</text>
  <text class="body" x="110" y="286">LinkedIn</text>
  <text class="body" x="110" y="314">Glassdoor</text>

  <rect class="box2" x="410" y="160" width="310" height="170"/>
  <text class="small" x="450" y="210">Scraping por ciclos</text>
  <text class="body" x="450" y="244">• ejecución periódica</text>
  <text class="body" x="450" y="272">• múltiples términos de búsqueda</text>
  <text class="body" x="450" y="300">• consulta separada por portal</text>
  <text class="body" x="450" y="328">• filtro de recencia</text>

  <rect class="box" x="800" y="180" width="290" height="130"/>
  <text class="small" x="840" y="225">Salida bruta por ciclo</text>
  <text class="body" x="840" y="258">CSV `jobs_raw_cycle_*.csv`</text>
  <text class="body" x="840" y="286">trazabilidad de cada corrida</text>

  <rect class="box2" x="1170" y="160" width="330" height="170"/>
  <text class="small" x="1210" y="210">Merge incremental</text>
  <text class="body" x="1210" y="244">• lectura del maestro actual</text>
  <text class="body" x="1210" y="272">• incorporación solo de nuevas filas</text>
  <text class="body" x="1210" y="300">• clave de deduplicación por URL</text>
  <text class="body" x="1210" y="328">  o metadatos de la oferta</text>

  <rect class="box3" x="510" y="470" width="570" height="180"/>
  <text class="small" x="550" y="520">Dataset maestro actualizado</text>
  <text class="body" x="550" y="556">`job_posts_master.csv` consolidado sin reconstrucción completa</text>
  <text class="body" x="550" y="590">• ofertas recientes</text>
  <text class="body" x="550" y="618">• registros deduplicados</text>
  <text class="body" x="550" y="646">• columnas homogéneas para el ETL posterior</text>

  <rect class="box" x="1180" y="500" width="300" height="120"/>
  <text class="small" x="1220" y="545">Automatización</text>
  <text class="body" x="1220" y="578">Tarea programada en Windows</text>
  <text class="body" x="1220" y="606">ejecución L-V a hora fija</text>

  <line class="arrow" x1="330" y1="245" x2="410" y2="245"/>
  <line class="arrow" x1="720" y1="245" x2="800" y2="245"/>
  <line class="arrow" x1="1090" y1="245" x2="1170" y2="245"/>
  <line class="arrow" x1="1335" y1="330" x2="1335" y2="430"/>
  <line class="arrow" x1="1335" y1="430" x2="1080" y2="430"/>
  <line class="arrow" x1="1080" y1="430" x2="1080" y2="560"/>
  <line class="arrow" x1="1080" y1="560" x2="1180" y2="560"/>

  <text class="note" x="70" y="820">Figura sugerida para el TFM: flujo simplificado del scraping recurrente y del proceso de actualización incremental del dataset de ofertas.</text>
</svg>
